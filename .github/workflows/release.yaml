name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install build
      - name: Build
        run: python -m build
      - name: Verify package contents
        run: |
          pip install twine
          twine check dist/*

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Generate structured release notes
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          TAG="${{ github.ref_name }}"
          {
            if [ -z "$PREV_TAG" ]; then
              echo "🎉 Initial release"
            else
              echo "## What's Changed"
              echo ""
              for prefix_label in "feat:✨ Features" "fix:🐛 Bug Fixes" "perf:⚡ Performance" "docs:📖 Documentation"; do
                prefix="${prefix_label%%:*}"
                label="${prefix_label#*:}"
                items=$(git log "$PREV_TAG..$TAG" --format="- %s (%h)" --grep="^${prefix}" 2>/dev/null || true)
                if [ -n "$items" ]; then
                  echo "### $label"
                  echo "$items"
                  echo ""
                fi
              done
              uncategorized=$(git log "$PREV_TAG..$TAG" --format="- %s (%h)" \
                --invert-grep --grep="^feat" --grep="^fix" --grep="^perf" --grep="^docs" 2>/dev/null || true)
              if [ -n "$uncategorized" ]; then
                echo "### 🔧 Other Changes"
                echo "$uncategorized"
                echo ""
              fi
              echo "### 📊 Diff Summary"
              echo '```'
              git diff --stat "$PREV_TAG..$TAG" | tail -1
              echo '```'
              echo ""
              echo "**Full Changelog**: https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG}"
            fi
          } > /tmp/release-body.md
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --notes-file /tmp/release-body.md

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install build
      - name: Build
        run: python -m build
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$VERSION" != "$CURRENT" ]; then
            sed -i "s/^version = \"$CURRENT\"/version = \"$VERSION\"/" pyproject.toml
            python -m build
          fi
      - name: Publish to PyPI (OIDC provenance)
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
