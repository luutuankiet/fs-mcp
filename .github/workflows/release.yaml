name: Publish to PyPI

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install build
      - name: Build
        run: python -m build
      - name: Verify package contents
        run: |
          pip install twine
          twine check dist/*

  release:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Create GitHub Release with auto-generated notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes

  publish:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install build
      - name: Build
        run: python -m build
      - name: Set version from tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          CURRENT=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          if [ "$VERSION" != "$CURRENT" ]; then
            sed -i "s/^version = \"$CURRENT\"/version = \"$VERSION\"/" pyproject.toml
            python -m build
          fi
      - name: Publish to PyPI (OIDC provenance)
        uses: pypa/gh-action-pypi-publish@release/v1
