name: Test

# Disabled 2026-04-19 — smoke job's "Verify managed bins" step fails on both
# ubuntu-latest (missing yq) and macos-14 (missing jq) after --doctor runs.
# Pre-dates v2 rewrite (see fs-mcp v1 smoke expectations). Left as
# workflow_dispatch so it can still be kicked manually during triage.
on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go build -o /tmp/fs-mcp ./cmd/fs-mcp
      - run: /tmp/fs-mcp --version
      - run: /tmp/fs-mcp --print-root

  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-14]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build
        run: go build -o fs-mcp ./cmd/fs-mcp
      - name: Doctor (bootstrap deps)
        run: ./fs-mcp --doctor
      - name: Verify managed bins
        run: |
          ls -la $HOME/.local/bin/
          $HOME/.local/bin/jq --version
          $HOME/.local/bin/yq --version
          $HOME/.local/bin/rg --version | head -1
