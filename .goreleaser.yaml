version: 2
project_name: fs-mcp

before:
  hooks:
    - go mod tidy

builds:
  - id: fs-mcp
    main: ./cmd/fs-mcp
    binary: fs-mcp
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: fs-mcp
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - README.md
      - LICENSE*

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

release:
  github:
    owner: luutuankiet
    name: fs-mcp
  draft: false
  prerelease: auto
  mode: replace
